version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: expense_tracker_db_prod
    environment:
      POSTGRES_USER: ${DB_USER:-expense_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${DB_NAME:-expense_tracker_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - expense_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-expense_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: expense_tracker_cache_prod
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - expense_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-change_me_in_production}

  # Flask Application
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: expense_tracker_app_prod
    environment:
      FLASK_ENV: production
      FLASK_APP: app.py
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql://${DB_USER:-expense_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-expense_tracker_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MAIL_SERVER: ${MAIL_SERVER}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      SENTRY_DSN: ${SENTRY_DSN}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - expense_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Celery Worker for background tasks
  celery:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: expense_tracker_celery_prod
    command: celery -A app.celery worker --loglevel=info
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-expense_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-expense_tracker_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MAIL_SERVER: ${MAIL_SERVER}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    depends_on:
      - postgres
      - redis
      - app
    networks:
      - expense_network
    restart: unless-stopped

  # Optional: Celery Beat for scheduled tasks
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: expense_tracker_beat_prod
    command: celery -A app.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-expense_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-expense_tracker_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - postgres
      - redis
      - app
    networks:
      - expense_network
    restart: unless-stopped

  # Optional: Nginx reverse proxy & load balancer
  nginx:
    image: nginx:alpine
    container_name: expense_tracker_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - expense_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  expense_network:
    driver: bridge
