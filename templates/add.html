{% extends "base.html" %}
{% block content %}

<div class="add-expense-container mb-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card add-expense-card">
        <div class="card-header">
          <div>
            <h2 class="mb-2"><i class="bi bi-plus-circle me-2"></i>Add New Expense</h2>
            <p class="text-muted mb-0">Track your spending effortlessly</p>
          </div>
        </div>
        <div class="card-body">
          <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-4">
              <label class="form-label fw-700">Title <span class="text-danger">*</span></label>
              <input name="title" class="form-control form-control-lg" placeholder="e.g., Grocery Shopping" required>
            </div>

            <div class="row mb-4">
              <div class="col-md-4">
                <label class="form-label fw-700">Amount <span class="text-danger">*</span></label>
                <div class="input-group input-group-lg">
                  <span class="input-group-text currency-symbol" style="background: linear-gradient(135deg, rgba(0,166,255,0.1), rgba(123,228,149,0.1)); border: 1.5px solid rgba(0,166,255,0.2);">$</span>
                  <input name="amount" type="number" step="0.01" class="form-control" placeholder="0.00" required>
                </div>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-700">Category <span class="text-danger">*</span></label>
                <select name="category" class="form-select form-select-lg">
                  <option>Food</option>
                  <option>Travel</option>
                  <option>Rent</option>
                  <option>Utilities</option>
                  <option>Shopping</option>
                  <option>Entertainment</option>
                  <option>Healthcare</option>
                  <option>Other</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-700">Date <span class="text-danger">*</span></label>
                <input name="date" type="date" class="form-control form-control-lg">
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-700">Receipt (optional)</label>
              <div class="form-control form-control-lg p-4" id="dropZone" style="border: 2.5px dashed rgba(0,166,255,0.4); border-radius: 12px; cursor: pointer; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); background: linear-gradient(135deg, rgba(0,166,255,0.05), rgba(123,228,149,0.05));">
                <input type="file" id="receiptFile" accept="image/*,.pdf" style="display:none;">
                <div id="dropText" class="text-center">
                  <i class="bi bi-cloud-upload" style="font-size: 2.5rem; background: linear-gradient(135deg, var(--sea), var(--mint-deep)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
                  <p class="mt-3 mb-1 fw-600" style="color: var(--text);">Drag receipt image here or click to select</p>
                  <small class="text-muted">Supported: PNG, JPG, PDF (max 5MB)</small>
                </div>
                <div id="uploadProgress" style="display:none;">
                  <div class="progress mt-3" style="height: 6px;">
                    <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%; background: linear-gradient(90deg, var(--mint-deep), var(--sea));"></div>
                  </div>
                </div>
              </div>
              <small id="fileName" class="text-muted d-block mt-2"></small>
            </div>

            <div class="mb-4">
              <label class="form-label fw-700">Description (optional)</label>
              <textarea name="description" class="form-control" rows="3" placeholder="Add any notes about this expense..."></textarea>
            </div>

            <div class="d-flex gap-3 pt-3">
              <button type="submit" class="btn btn-primary btn-lg flex-grow-1">
                <i class="bi bi-check-circle me-2"></i>Save Expense
              </button>
              <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline-secondary btn-lg">
                <i class="bi bi-x-circle me-2"></i>Cancel
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  .add-expense-card {
    margin-top: 2rem;
  }

  #dropZone:hover {
    border-color: rgba(0,166,255,0.6);
    background: linear-gradient(135deg, rgba(0,166,255,0.1), rgba(123,228,149,0.08));
    box-shadow: 0 8px 24px rgba(0,166,255,0.12);
    transform: translateY(-2px);
  }

  .currency-symbol {
    background: linear-gradient(135deg, rgba(0,166,255,0.1), rgba(123,228,149,0.1)) !important;
    border: 1.5px solid rgba(0,166,255,0.2) !important;
    color: var(--sea);
    font-weight: 700;
  }
</style>

<script>
const dropZone = document.getElementById('dropZone');
const receiptFile = document.getElementById('receiptFile');
const fileName = document.getElementById('fileName');

// Click to select
dropZone.addEventListener('click', () => receiptFile.click());

// File selection
receiptFile.addEventListener('change', (e) => {
    if (e.target.files.length > 0) {
        fileName.textContent = `📄 Selected: ${e.target.files[0].name}`;
        dropZone.style.borderColor = 'rgba(123,228,149,0.6)';
        dropZone.style.background = 'linear-gradient(135deg, rgba(123,228,149,0.1), rgba(16,185,129,0.08))';
    }
});

// Drag and drop
dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.style.backgroundColor = 'rgba(0,166,255,0.1)';
    dropZone.style.borderColor = 'rgba(0,166,255,0.6)';
});

dropZone.addEventListener('dragleave', () => {
    dropZone.style.backgroundColor = 'rgba(0,166,255,0.05)';
    dropZone.style.borderColor = 'rgba(0,166,255,0.4)';
});

dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.style.backgroundColor = 'rgba(0,166,255,0.05)';
    dropZone.style.borderColor = 'rgba(123,228,149,0.6)';
    
    const files = e.dataTransfer.files;
    if (files.length > 0) {
        receiptFile.files = files;
        fileName.textContent = `📄 Selected: ${files[0].name}`;
        dropZone.style.background = 'linear-gradient(135deg, rgba(123,228,149,0.1), rgba(16,185,129,0.08))';
    }
});
</script>

{% endblock %}
