<!-- Modern Chat Assistant Widget
     Add to templates/dashboard.html or any page where you want the chat interface
-->

<div id="chatWidget" class="chat-widget" style="display: none;">
    <div class="chat-container">
        <div class="chat-header">
            <h5>💬 Expense Assistant</h5>
            <button onclick="closeChatWidget()" class="close-btn">&times;</button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="chat-message assistant-message">
                <p>Hi! Ask me about your expenses. Try: "How much did I spend on food?" or "What's my budget?"</p>
            </div>
        </div>
        <div class="chat-input-area">
            <input 
                type="text" 
                id="chatInput" 
                class="chat-input" 
                placeholder="Ask about your expenses..."
                onkeypress="handleChatInput(event)"
            >
            <button onclick="sendChatMessage()" class="send-btn">Send</button>
        </div>
    </div>
</div>

<button onclick="toggleChatWidget()" id="chatToggleBtn" class="chat-toggle-btn" title="Open Expense Assistant">
    💬
</button>

<style>
.chat-toggle-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    transition: all 0.3s ease;
    z-index: 999;
}

.chat-toggle-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
}

.chat-toggle-btn:active {
    transform: scale(0.95);
}

.chat-widget {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 400px;
    max-height: 600px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 5px 40px rgba(0, 0, 0, 0.16);
    display: flex;
    flex-direction: column;
    z-index: 1000;
    animation: slideUp 0.3s ease-out;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.chat-container {
    display: flex;
    flex-direction: column;
    height: 100%;
}

.chat-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 16px;
    border-radius: 12px 12px 0 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.chat-header h5 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
}

.close-btn {
    background: none;
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
    padding: 0;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.8;
    transition: opacity 0.2s;
}

.close-btn:hover {
    opacity: 1;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: #f8f9fa;
}

.chat-message {
    padding: 10px 14px;
    border-radius: 8px;
    word-wrap: break-word;
    animation: fadeIn 0.3s ease;
    max-width: 90%;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.user-message {
    background: #667eea;
    color: white;
    margin-left: auto;
    text-align: right;
}

.assistant-message {
    background: white;
    color: #333;
    border: 1px solid #e0e0e0;
    margin-right: auto;
}

.chat-input-area {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid #e0e0e0;
    background: white;
    border-radius: 0 0 12px 12px;
}

.chat-input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    transition: border-color 0.2s;
}

.chat-input:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.send-btn {
    padding: 10px 16px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 500;
    transition: transform 0.2s;
}

.send-btn:hover {
    transform: translateY(-2px);
}

.send-btn:active {
    transform: translateY(0);
}

/* Responsive */
@media (max-width: 600px) {
    .chat-widget {
        width: calc(100% - 40px);
        bottom: 80px;
        max-height: 500px;
    }
}
</style>

<script>
function toggleChatWidget() {
    const widget = document.getElementById('chatWidget');
    widget.style.display = widget.style.display === 'none' ? 'flex' : 'none';
    if (widget.style.display === 'flex') {
        document.getElementById('chatInput').focus();
    }
}

function closeChatWidget() {
    document.getElementById('chatWidget').style.display = 'none';
}

function handleChatInput(event) {
    if (event.key === 'Enter') {
        sendChatMessage();
    }
}

async function sendChatMessage() {
    const input = document.getElementById('chatInput');
    const query = input.value.trim();
    
    if (!query) return;
    
    // Add user message
    addChatMessage(query, 'user');
    input.value = '';
    
    // Show typing indicator
    const messagesDiv = document.getElementById('chatMessages');
    const typingDiv = document.createElement('div');
    typingDiv.id = 'typingIndicator';
    typingDiv.className = 'chat-message assistant-message';
    typingDiv.innerHTML = '<p>Thinking...</p>';
    messagesDiv.appendChild(typingDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    
    try {
        // Get JWT token from localStorage or session
        const token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
        
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ query })
        });
        
        const data = await response.json();
        
        // Remove typing indicator
        document.getElementById('typingIndicator').remove();
        
        if (response.ok) {
            addChatMessage(data.response, 'assistant');
        } else {
            addChatMessage('Sorry, I had trouble understanding that. Try asking about your spending, budget, or expenses.', 'assistant');
        }
    } catch (error) {
        console.error('Chat error:', error);
        document.getElementById('typingIndicator').remove();
        addChatMessage('Sorry, I\'m having connection issues. Please try again.', 'assistant');
    }
}

function addChatMessage(text, sender) {
    const messagesDiv = document.getElementById('chatMessages');
    const messageDiv = document.createElement('div');
    messageDiv.className = `chat-message ${sender}-message`;
    messageDiv.innerHTML = `<p>${escapeHtml(text)}</p>`;
    messagesDiv.appendChild(messageDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function escapeHtml(text) {
    const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, m => map[m]);
}
</script>
