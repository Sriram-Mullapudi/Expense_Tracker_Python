{% extends "base.html" %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:70vh;">
  <div class="card p-4" style="width:480px;">
    <h4 class="mb-3">Forgot Password</h4>
    <p class="text-muted mb-4">Enter your email address and we'll send you a link to reset your password.</p>
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input name="email" type="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-primary flex-grow-1" type="submit">Send Reset Link</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('auth.login') }}">Back to Login</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
