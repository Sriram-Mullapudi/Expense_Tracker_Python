{% extends "base.html" %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:75vh;">
  <div class="card p-5" style="width:100%; max-width:420px;">
    <div class="mb-4 text-center">
      <h2 class="mb-2">Welcome Back</h2>
      <p class="text-muted">Login to your expense tracker account</p>
    </div>
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-4">
        <label class="form-label fw-700">Username</label>
        <input name="username" class="form-control form-control-lg" placeholder="Enter your username" required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-700">Password</label>
        <input name="password" type="password" class="form-control form-control-lg" placeholder="Enter your password" required>
      </div>
      <button class="btn btn-primary btn-lg w-100 mb-3" type="submit">
        <i class="bi bi-box-arrow-in-right me-2"></i>Login
      </button>
      <a class="btn btn-outline-primary btn-lg w-100" href="/register">
        <i class="bi bi-person-plus me-2"></i>Create Account
      </a>
      <div class="text-center mt-4 pt-2">
        <p class="text-muted small mb-2">
          <a href="{{ url_for('auth.forgot_password') }}" class="text-decoration-none">Forgot password?</a>
        </p>
        <p class="text-muted small mb-0">
          <a href="{{ url_for('auth.forgot_username') }}" class="text-decoration-none">Forgot username?</a>
        </p>
      </div>
    </form>
  </div>
</div>
{% endblock %}
