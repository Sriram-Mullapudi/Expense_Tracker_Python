{% extends "base.html" %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:75vh;">
  <div class="card p-5" style="width:100%; max-width:480px;">
    <div class="mb-4 text-center">
      <h2 class="mb-2">Join Us Today</h2>
      <p class="text-muted">Create your expense tracker account</p>
    </div>
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-4">
        <label class="form-label fw-700">Username</label>
        <input name="username" class="form-control form-control-lg" placeholder="Choose a username" required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-700">Email</label>
        <input name="email" type="email" class="form-control form-control-lg" placeholder="you@example.com" required>
      </div>
      <div class="row g-3 mb-4">
        <div class="col">
          <label class="form-label fw-700">Password</label>
          <input name="password" type="password" class="form-control form-control-lg" placeholder="Password" required>
        </div>
        <div class="col">
          <label class="form-label fw-700">Confirm</label>
          <input name="confirm_password" type="password" class="form-control form-control-lg" placeholder="Confirm password" required>
        </div>
      </div>
      <button class="btn btn-primary btn-lg w-100 mb-3" type="submit">
        <i class="bi bi-person-plus me-2"></i>Create Account
      </button>
      <a class="btn btn-outline-primary btn-lg w-100" href="{{ url_for('auth.login') }}">
        <i class="bi bi-box-arrow-in-right me-2"></i>Already have an account?
      </a>
    </form>
  </div>
</div>
{% endblock %}
