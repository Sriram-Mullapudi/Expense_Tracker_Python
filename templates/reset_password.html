{% extends "base.html" %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:70vh;">
  <div class="card p-4" style="width:480px;">
    <h4 class="mb-3">Reset Password</h4>
    <p class="text-muted mb-4">Enter your new password below.</p>
    <form method="post">
      <input type=\"hidden\" name=\"csrf_token\" value=\"{{ csrf_token() }}\">
      <div class="row g-2 mb-3">
        <div class="col">
          <label class="form-label">New Password</label>
          <input name="password" type="password" class="form-control" placeholder="New password" required>
        </div>
        <div class="col">
          <label class="form-label">Confirm</label>
          <input name="confirm_password" type="password" class="form-control" placeholder="Confirm password" required>
        </div>
      </div>
      <button class="btn btn-primary w-100" type="submit">Reset Password</button>
    </form>
  </div>
</div>
{% endblock %}
